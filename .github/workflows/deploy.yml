name: Deploy to AWS EC2 via Docker Hub

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 push되면 자동으로 빌드 및 배포가 진행됩니다.

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 Docker Hub 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/recipekr:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH를 통한 EC2 접속 및 배포 명령 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu   # 깃허브 시크릿에 없으므로 ubuntu로 하드코딩 설정
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. 프로젝트 폴더로 이동
            cd /home/ubuntu/recipekr
            
            # 2. 최신 설정 및 compose 파일 동기화를 위해 git pull
            git pull origin main
            
            # 3. Docker Hub 로그인 (최신 이미지 pull 권한 확보)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 4. 이미지명 주입 및 기존 서비스 중지
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker-compose down
            
            # 5. Docker Hub에서 최신 빌드 이미지 pull
            docker-compose pull
            
            # 6. 서비스 가동 (EC2에서 직접 빌드하지 않아 빌드 메모리 걱정 없이 1초만에 기동됩니다)
            docker-compose up -d
            
            # 7. 미사용 이미지/컨테이너 정리 (EC2 디스크 절약)
            docker image prune -f
