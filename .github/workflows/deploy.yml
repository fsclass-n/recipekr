name: CI/CD Deploy Pipeline

on:
  push:
    branches:
      - main # main 브랜치에 푸시될 때만 작동

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 빌드 시간 단축을 위한 그레이들 캐싱

      # 1. 빌드 및 테스트 수행 (여기서 에러가 나면 다음 단계로 안 넘어가고 빌드가 중단됨)
      - name: Build and Test with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test # 테스트 코드를 포함해 빌드하려면 -x test를 제거하세요.

      # 2. 빌드가 완벽히 성공하면 렌더에 배포 요청 전송
      - name: Trigger Render Deploy
        if: success() # 이전 단계들이 모두 성공했을 때만 실행
        run: |
          echo "Triggering Render deployment..."
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy trigger sent successfully."