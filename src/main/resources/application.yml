spring:
  datasource:
    url: jdbc:mysql://localhost:3306/recipekr?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: your_password_here
    driver-class-name: com.mysql.cj.jdbc.Driver

  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML

  web:
    resources:
      static-locations: classpath:/static/

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      timeout: 30m

logging:
  level:
    com.recipekr: DEBUG
    org.springframework.security: DEBUG
