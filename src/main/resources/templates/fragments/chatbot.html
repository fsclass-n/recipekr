<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="chatbot">
    <!-- Chatbot Toggle Button -->
    <button class="chatbot-toggler animate-float" id="chatbotToggler" aria-label="챗봇 열기">
        <i class="bi bi-robot fs-3"></i>
    </button>

    <!-- Chatbot Window -->
    <div class="chatbot-window shadow-lg" id="chatbotWindow">
        <div class="chatbot-header d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-robot fs-4"></i>
                <h6 class="mb-0 fw-bold">AI 레시피 도우미</h6>
            </div>
            <button class="btn-close btn-close-white" id="chatbotClose" aria-label="닫기"></button>
        </div>
        <div class="chatbot-body" id="chatbotBody">
            <div class="chat-message bot">
                <div class="msg-bubble">
                    안녕하세요! 무엇을 도와드릴까요? 레시피에 대해 궁금한 점을 물어보세요!
                </div>
            </div>
        </div>
        <div class="chatbot-footer">
            <form id="chatbotForm" class="d-flex gap-2" onsubmit="event.preventDefault(); sendChatMessage();">
                <input type="text" id="chatInput" class="form-control" placeholder="메시지를 입력하세요..." autocomplete="off">
                <button type="submit" class="btn btn-primary" id="chatSubmitBtn">
                    <i class="bi bi-send-fill"></i>
                </button>
            </form>
        </div>
    </div>

    <style>
        .chatbot-toggler {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            cursor: pointer;
            z-index: 1050;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        .chatbot-toggler:hover {
            transform: scale(1.1);
        }
        .chatbot-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            height: 500px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            z-index: 1050;
            transform: scale(0);
            transform-origin: bottom right;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.25s ease-in, opacity 0.25s ease-in; /* 닫힐 때는 부드럽게 */
        }
        .chatbot-window.show {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.35s ease-out; /* 열릴 때는 통통 튀게 */
        }
        .chatbot-header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 15px 20px;
        }
        .chatbot-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chatbot-footer {
            padding: 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        .chat-message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .chat-message.user {
            align-self: flex-end;
        }
        .chat-message.bot {
            align-self: flex-start;
        }
        .msg-bubble {
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            word-wrap: break-word;
        }
        .chat-message.user .msg-bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 5px;
        }
        .chat-message.bot .msg-bubble {
            background: #e2e8f0;
            color: #1e293b;
            border-bottom-left-radius: 5px;
        }
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: #64748b;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggler = document.getElementById('chatbotToggler');
            const windowEl = document.getElementById('chatbotWindow');
            const closeBtn = document.getElementById('chatbotClose');
            const bodyEl = document.getElementById('chatbotBody');
            const inputEl = document.getElementById('chatInput');
            const submitBtn = document.getElementById('chatSubmitBtn');

            // 챗봇 열기/닫기
            toggler.addEventListener('click', () => {
                windowEl.classList.toggle('show');
                if(windowEl.classList.contains('show')) {
                    inputEl.focus();
                }
            });

            closeBtn.addEventListener('click', () => {
                windowEl.classList.remove('show');
            });

            // 메시지 전송
            window.sendChatMessage = async function() {
                const message = inputEl.value.trim();
                if (!message) return;

                // 유저 메시지 추가
                appendMessage(message, 'user');
                inputEl.value = '';
                submitBtn.disabled = true;

                // 로딩 인디케이터 추가
                const loadingId = 'loading-' + Date.now();
                appendLoading(loadingId);

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ message: message })
                    });
                    
                    removeElement(loadingId);
                    
                    if (response.ok) {
                        const data = await response.json();
                        appendMessage(data.response || '응답을 받지 못했습니다.', 'bot');
                    } else {
                        appendMessage('오류가 발생했습니다. 다시 시도해주세요.', 'bot');
                    }
                } catch (error) {
                    removeElement(loadingId);
                    appendMessage('네트워크 오류가 발생했습니다.', 'bot');
                } finally {
                    submitBtn.disabled = false;
                    inputEl.focus();
                }
            };

            function appendMessage(text, sender) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-message ' + sender;
                msgDiv.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>`;
                bodyEl.appendChild(msgDiv);
                bodyEl.scrollTop = bodyEl.scrollHeight;
            }

            function appendLoading(id) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-message bot';
                msgDiv.id = id;
                msgDiv.innerHTML = `
                    <div class="msg-bubble">
                        <div class="loading-dots">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                `;
                bodyEl.appendChild(msgDiv);
                bodyEl.scrollTop = bodyEl.scrollHeight;
            }

            function removeElement(id) {
                const el = document.getElementById(id);
                if (el) el.remove();
            }

            function escapeHtml(unsafe) {
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;")
                    .replace(/\n/g, "<br>");
            }
        });
    </script>
</div>
</body>
</html>
