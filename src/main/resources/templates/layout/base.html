<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | 냉장고 레시피'">냉장고 레시피</title>
    <meta name="description" th:content="${pageDesc} ?: '냉장고 속 재료로 만드는 AI 레시피 추천 서비스'">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
          rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css}">

    <!-- Page-specific CSS slot -->
    <th:block th:replace="${extraCss} ?: ~{}"></th:block>
</head>
<body>

<!-- ─── NAVBAR ─── -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-icon">🍽️</span>
            <span class="brand-text">냉장고 레시피</span>
        </a>

        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house-door me-1"></i>홈
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/recipe/recommend}">
                        <i class="bi bi-stars me-1"></i>레시피 추천
                    </a>
                </li>
            </ul>

            <!-- 로그인 상태에 따른 네비게이션 -->
            <div class="d-flex align-items-center gap-2">
                <!-- 비로그인 -->
                <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                    <a th:href="@{/auth/login}" class="btn btn-outline-light btn-sm px-3">
                        <i class="bi bi-box-arrow-in-right me-1"></i>로그인
                    </a>
                    <a th:href="@{/auth/signup}" class="btn btn-accent btn-sm px-3">
                        <i class="bi bi-person-plus me-1"></i>회원가입
                    </a>
                </div>

                <!-- 로그인 상태 -->
                <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
                    <span class="text-white-50 d-none d-md-inline">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name"></span>님
                    </span>
                    <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm px-3">
                        <i class="bi bi-box-arrow-right me-1"></i>로그아웃
                    </a>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ─── MAIN CONTENT ─── -->
<main th:replace="${content}">
    <!-- 각 페이지의 콘텐츠가 여기에 삽입됩니다 -->
</main>

<!-- ─── FOOTER ─── -->
<footer class="footer mt-auto py-4">
    <div class="container text-center">
        <p class="mb-1 text-muted">
            <span class="brand-gradient-text fw-semibold">냉장고 레시피</span>
            &nbsp;—&nbsp; AI가 추천하는 오늘의 레시피
        </p>
        <p class="mb-0 text-muted small">
            &copy; 2024 RecipeKR. Built with Spring Boot 3 &amp; Python AI
        </p>
    </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmQjhsBm21bJRZWWJGVJQAOqPdgu"
        crossorigin="anonymous"></script>

<!-- Page-specific JS slot -->
<th:block th:replace="${extraJs} ?: ~{}"></th:block>

</body>
</html>
