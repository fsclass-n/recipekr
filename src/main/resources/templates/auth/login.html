<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="냉장고 파먹기 AI 레시피 추천 - 로그인">
    <title>로그인 | 냉장고 파먹기</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <!-- Page CSS -->
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body">

<!-- 배경 장식 -->
<div class="auth-bg-decoration" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
</div>

<!-- 그리드 패턴 오버레이 -->
<div class="auth-grid-overlay" aria-hidden="true"></div>

<div class="auth-wrapper">
    <!-- ─── 왼쪽: 브랜딩 섹션 ─── -->
    <div class="auth-branding d-none d-lg-flex">
        <div class="branding-inner">
            <div class="branding-logo animate-fade-in-up">
                <span class="logo-emoji animate-float">🍽️</span>
            </div>
            <h1 class="branding-title animate-fade-in-up delay-100">
                냉장고 속 재료로<br>
                <span class="brand-gradient-text">AI가 레시피를</span><br>
                추천해 드려요
            </h1>
            <p class="branding-desc animate-fade-in-up delay-200">
                오늘 마트 할인 식재료까지 반영한<br>
                스마트한 레시피 추천 서비스
            </p>

            <!-- 기능 하이라이트 -->
            <div class="feature-list animate-fade-in-up delay-300">
                <div class="feature-item">
                    <div class="feature-icon">🤖</div>
                    <span>TF-IDF 기반 AI 유사도 추천</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🛒</div>
                    <span>실시간 마트 할인 정보 반영</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🥗</div>
                    <span>건강 유형별 맞춤 필터링</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── 오른쪽: 로그인 폼 섹션 ─── -->
    <div class="auth-form-section">
        <div class="auth-form-card animate-fade-in-up">

            <!-- 모바일 로고 -->
            <div class="mobile-logo d-lg-none text-center mb-4">
                <span style="font-size: 2.5rem">🍽️</span>
                <span class="brand-gradient-text fw-bold d-block" style="font-size: 1.3rem">냉장고 파먹기</span>
            </div>

            <!-- 카드 헤더 -->
            <div class="form-card-header">
                <h2 class="form-card-title">로그인</h2>
                <p class="form-card-subtitle">계정에 로그인하여 레시피 추천을 받아보세요</p>
            </div>

            <!-- 알림 메시지 -->
            <div th:if="${param.error}" class="alert-dark-danger p-3 mb-4 rounded-3 d-flex align-items-center gap-2" role="alert">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span>아이디 또는 비밀번호가 올바르지 않습니다.</span>
            </div>

            <div th:if="${param.logout}" class="alert-dark-success p-3 mb-4 rounded-3 d-flex align-items-center gap-2" role="alert">
                <i class="bi bi-check-circle-fill"></i>
                <span>정상적으로 로그아웃되었습니다.</span>
            </div>

            <div th:if="${successMessage}" class="alert-dark-success p-3 mb-4 rounded-3 d-flex align-items-center gap-2" role="alert">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${successMessage}"></span>
            </div>

            <!-- 로그인 폼 -->
            <form th:action="@{/auth/login}" method="post" id="loginForm" novalidate>
                <!-- CSRF 토큰 (Spring Security 자동 삽입) -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- 아이디 입력 -->
                <div class="mb-4">
                    <label for="username" class="form-label-dark">아이디</label>
                    <div class="input-group input-group-dark">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text"
                               id="username"
                               name="username"
                               class="form-control form-control-dark"
                               placeholder="아이디를 입력하세요"
                               autocomplete="username"
                               required>
                    </div>
                </div>

                <!-- 비밀번호 입력 -->
                <div class="mb-5">
                    <label for="password" class="form-label-dark">비밀번호</label>
                    <div class="input-group input-group-dark">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control form-control-dark"
                               placeholder="비밀번호를 입력하세요"
                               autocomplete="current-password"
                               required>
                        <button class="btn-toggle-pw input-group-text"
                                type="button"
                                id="togglePassword"
                                aria-label="비밀번호 표시/숨기기">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- 로그인 버튼 -->
                <button type="submit" id="loginBtn" class="btn btn-gradient-lg w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>로그인
                </button>
            </form>

            <!-- 구분선 -->
            <div class="divider-or">
                <span>또는</span>
            </div>

            <!-- 회원가입 링크 -->
            <div class="text-center">
                <p class="text-muted-light mb-0" style="font-size: var(--font-size-sm)">
                    아직 계정이 없으신가요?
                    <a th:href="@{/auth/signup}" class="auth-link">
                        회원가입하기 <i class="bi bi-arrow-right"></i>
                    </a>
                </p>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- 비밀번호 토글 스크립트 -->
<script>
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');

    toggleBtn.addEventListener('click', () => {
        const isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        toggleIcon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    });

    // 폼 제출 시 버튼 로딩 상태
    document.getElementById('loginForm').addEventListener('submit', () => {
        const btn = document.getElementById('loginBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>로그인 중...';
        btn.disabled = true;
    });

    // 네비게이션바 스크롤 효과
    window.addEventListener('scroll', () => {
        const navbar = document.getElementById('mainNavbar');
        if (navbar) {
            navbar.classList.toggle('scrolled', window.scrollY > 20);
        }
    });
</script>

</body>
</html>
