<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 추천 결과 | 냉장고 레시피</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <style>
        .recipe-card { transition:transform .2s, box-shadow .2s; }
        .recipe-card:hover { transform:translateY(-4px); box-shadow:0 8px 32px rgba(124,58,237,.3); }
        .badge-rank {
            background:linear-gradient(135deg,#7c3aed,#4f46e5);
            color:#fff; border-radius:50%; width:36px; height:36px;
            display:inline-flex; align-items:center; justify-content:center;
            font-weight:700; font-size:1rem; flex-shrink:0;
        }
        .badge-health {
            background:rgba(124,58,237,.2); color:#a78bfa;
            border:1px solid #7c3aed; border-radius:20px; padding:3px 10px; font-size:.8rem;
        }
        .badge-cal {
            background:rgba(239,68,68,.15); color:#fca5a5;
            border:1px solid #ef4444; border-radius:20px; padding:3px 10px; font-size:.8rem;
        }
        .score-bar { height:6px; border-radius:3px; background:rgba(255,255,255,0.1); overflow:hidden; }
        .score-fill { height:100%; background:linear-gradient(90deg,#7c3aed,#60a5fa); transition:width 1s ease; }
        .result-title {
            background:linear-gradient(135deg,#a78bfa,#60a5fa);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .btn-back {
            background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
            color:#e2e8f0; border-radius:10px;
        }
        .btn-back:hover { background:rgba(255,255,255,0.12); color:#fff; }
        .empty-state { text-align:center; padding:3rem; color:#6b7280; }
    </style>
</head>
<body>

<!-- ─── NAVBAR ─── -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-icon">🍽️</span>
            <span class="brand-text">냉장고 레시피</span>
        </a>
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house-door me-1"></i>홈
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/recipe/recommend}">
                        <i class="bi bi-stars me-1"></i>레시피 추천
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                    <a th:href="@{/auth/login}" class="btn btn-outline-light btn-sm px-3">
                        <i class="bi bi-box-arrow-in-right me-1"></i>로그인
                    </a>
                </div>
                <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
                    <span class="text-white-50 d-none d-md-inline">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="principal.nickname">사용자</span>님
                    </span>
                    <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm px-3">
                        <i class="bi bi-box-arrow-right me-1"></i>로그아웃
                    </a>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ─── MAIN CONTENT ─── -->
<main>
<div class="container py-5" style="max-width:760px;">

    <!-- 헤더 -->
    <div class="d-flex align-items-center mb-4 gap-3">
        <a th:href="@{/recipe/recommend(open=true)}" class="btn btn-back text-nowrap">
            <i class="bi bi-arrow-left me-1"></i>다시 입력
        </a>
        <div>
            <h1 class="result-title fw-bold mb-0 fs-4">🍳 AI 추천 레시피</h1>
            <small style="color:rgba(255,255,255,0.5);">
                재료: <span style="color:#e2e8f0;" th:text="${ingredients}"></span>
                &nbsp;|&nbsp; 건강유형: <span style="color:#e2e8f0;" th:text="${healthType}"></span>
            </small>
        </div>
    </div>

    <!-- 결과 없음 -->
    <div th:if="${#lists.isEmpty(results)}" class="card-dark p-5 empty-state">
        <i class="bi bi-emoji-frown fs-1 d-block mb-3"></i>
        <p style="color:rgba(255,255,255,0.6);">추천 결과가 없습니다. 재료를 더 추가하거나 건강 유형을 변경해 보세요.</p>
        <a th:href="@{/recipe/recommend(open=true)}" class="btn btn-back mt-2 d-inline-block">← 다시 입력하기</a>
    </div>

    <!-- 추천 카드 목록 -->
    <div th:each="recipe : ${results}" class="card-dark recipe-card p-4 mb-3 shadow">
        <div class="d-flex align-items-start gap-3">
            <span class="badge-rank" th:text="${recipe['rank']}"></span>
            <div class="w-100">
                <!-- 제목 + 뱃지 -->
                <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                    <h5 class="mb-0 fw-bold text-white" th:text="${recipe['title']}"></h5>
                    <span class="badge-health" th:text="${recipe['health_type']}"></span>
                    <span class="badge-cal">
                        <i class="bi bi-fire me-1"></i>
                        <span th:text="${recipe['calories']}"></span> kcal
                    </span>
                </div>
                <!-- 재료 -->
                <p style="color:rgba(255,255,255,0.55); font-size:.9rem;" class="mb-2">
                    <i class="bi bi-basket me-1"></i>
                    <span th:text="${recipe['ingredients']}"></span>
                </p>
                <!-- 조리법 -->
                <p class="mb-3 text-white-75" style="font-size:.9rem; line-height:1.7; color:rgba(255,255,255,0.8);"
                   th:text="${recipe['recipe_text']}"></p>
                <!-- 유사도 점수 바 -->
                <div class="d-flex align-items-center gap-2">
                    <small style="color:rgba(255,255,255,0.45);">AI 매칭도</small>
                    <div class="score-bar flex-grow-1">
                        <div class="score-fill"
                             th:style="'width:' + ${(recipe['score'] * 100)} + '%'"></div>
                    </div>
                    <small style="color:rgba(255,255,255,0.45);"
                           th:text="${#numbers.formatDecimal(recipe['score'] * 100, 1, 1) + '%'}"></small>
                </div>
            </div>
        </div>
    </div>

</div>
</main>

<!-- ─── FOOTER ─── -->
<footer class="footer mt-auto py-4">
    <div class="container text-center">
        <p class="mb-1 text-muted">
            <span class="brand-gradient-text fw-semibold">냉장고 레시피</span>
            &nbsp;—&nbsp; AI가 추천하는 오늘의 레시피
        </p>
        <p class="mb-0 text-muted small">&copy; 2026 RecipeKR. Built with Spring Boot 3 &amp; Python AI</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.addEventListener('scroll', () => {
        document.getElementById('mainNavbar').classList.toggle('scrolled', window.scrollY > 30);
    });
</script>
</body>
</html>
