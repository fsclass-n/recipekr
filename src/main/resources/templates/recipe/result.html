<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 추천 결과 - 냉장고 파먹기</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background:#0f0f1a; color:#e2e8f0; font-family:'Segoe UI',sans-serif; }
        .card { background:#1e1e2e; border:1px solid #2d2d44; border-radius:16px; }
        .recipe-card { transition:transform .2s, box-shadow .2s; }
        .recipe-card:hover { transform:translateY(-4px); box-shadow:0 8px 32px rgba(124,58,237,.3); }
        .badge-rank {
            background:linear-gradient(135deg,#7c3aed,#4f46e5);
            color:#fff; border-radius:50%; width:36px; height:36px;
            display:inline-flex; align-items:center; justify-content:center;
            font-weight:700; font-size:1rem; flex-shrink:0;
        }
        .badge-health { background:rgba(124,58,237,.2); color:#a78bfa; border:1px solid #7c3aed; border-radius:20px; padding:3px 10px; font-size:.8rem; }
        .badge-cal { background:rgba(239,68,68,.15); color:#fca5a5; border:1px solid #ef4444; border-radius:20px; padding:3px 10px; font-size:.8rem; }
        .score-bar { height:6px; border-radius:3px; background:#2a2a3e; overflow:hidden; }
        .score-fill { height:100%; background:linear-gradient(90deg,#7c3aed,#60a5fa); transition:width 1s ease; }
        h2 { background:linear-gradient(135deg,#a78bfa,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .btn-back { background:#2a2a3e; border:1px solid #3d3d5c; color:#e2e8f0; border-radius:10px; }
        .btn-back:hover { background:#3d3d5c; color:#fff; }
        .empty-state { text-align:center; padding:3rem; color:#6b7280; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width:760px;">
    <!-- 헤더 -->
    <div class="d-flex align-items-center mb-4 gap-3">
        <a th:href="@{/recipe/recommend}" class="btn btn-back">
            <i class="bi bi-arrow-left me-1"></i>다시 입력
        </a>
        <div>
            <h2 class="fw-bold mb-0 fs-4">🍳 AI 추천 레시피</h2>
            <small class="text-secondary">
                재료: <span class="text-light" th:text="${ingredients}"></span>
                &nbsp;|&nbsp; 건강유형: <span class="text-light" th:text="${healthType}"></span>
            </small>
        </div>
    </div>

    <!-- 결과 없음 -->
    <div th:if="${#lists.isEmpty(results)}" class="card p-5 empty-state">
        <i class="bi bi-emoji-frown fs-1 d-block mb-3"></i>
        <p>추천 결과가 없습니다. 재료를 더 추가하거나 건강 유형을 변경해 보세요.</p>
        <a th:href="@{/recipe/recommend}" class="btn btn-back mt-2 d-inline-block">← 다시 입력하기</a>
    </div>

    <!-- 추천 카드 목록 -->
    <div th:each="recipe, iterStat : ${results}" class="card recipe-card p-4 mb-3 shadow">
        <div class="d-flex align-items-start gap-3">
            <span class="badge-rank" th:text="${recipe['rank']}"></span>
            <div class="w-100">
                <!-- 제목 + 뱃지 -->
                <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                    <h5 class="mb-0 fw-bold" th:text="${recipe['title']}"></h5>
                    <span class="badge-health" th:text="${recipe['health_type']}"></span>
                    <span class="badge-cal">
                        <i class="bi bi-fire me-1"></i>
                        <span th:text="${recipe['calories']}"></span> kcal
                    </span>
                </div>
                <!-- 재료 -->
                <p class="text-secondary mb-2" style="font-size:.9rem;">
                    <i class="bi bi-basket me-1"></i>
                    <span th:text="${recipe['ingredients']}"></span>
                </p>
                <!-- 조리법 -->
                <p class="mb-3" style="font-size:.9rem; line-height:1.7;" th:text="${recipe['recipe_text']}"></p>
                <!-- 유사도 점수 바 -->
                <div class="d-flex align-items-center gap-2">
                    <small class="text-secondary">AI 매칭도</small>
                    <div class="score-bar flex-grow-1">
                        <div class="score-fill"
                             th:style="'width:' + ${(recipe['score'] * 100)} + '%'"></div>
                    </div>
                    <small class="text-secondary"
                           th:text="${#numbers.formatDecimal(recipe['score'] * 100, 1, 1) + '%'}"></small>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
