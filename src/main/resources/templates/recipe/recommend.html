<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레시피 추천 | 냉장고 파먹기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>

<!-- ─── NAVBAR ─── -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-icon">🍽️</span>
            <span class="brand-text">냉장고 파먹기</span>
        </a>
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house-door me-1"></i>홈
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/recipe/recommend}">
                        <i class="bi bi-stars me-1"></i>레시피 추천
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                    <a th:href="@{/auth/login}" class="btn btn-outline-light btn-sm px-3">
                        <i class="bi bi-box-arrow-in-right me-1"></i>로그인
                    </a>
                </div>
                <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
                    <span class="text-white-50 d-none d-md-inline">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${user != null ? user.nickname : ''} + '님'"></span>
                    </span>
                    <a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm px-3">
                        <i class="bi bi-box-arrow-right me-1"></i>로그아웃
                    </a>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ─── MAIN CONTENT ─── -->
<main>
<div class="container py-5" style="max-width:680px;">
    <div class="text-center mb-4">
        <h1 class="fw-bold fs-2" style="background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
            🍳 냉장고 파먹기 AI
        </h1>
        <p style="color:rgba(255,255,255,0.55);">재료를 입력하면 건강 상태에 맞는 레시피를 추천해 드립니다.</p>
    </div>
    <div class="card-dark p-4 shadow">
        <form th:action="@{/recipe/recommend}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- 재료 입력 -->
            <div class="mb-3">
                <label for="ingredients" class="form-label-dark">
                    <i class="bi bi-basket2 text-warning me-1"></i>냉장고 재료
                </label>
                <input type="text" id="ingredients" name="ingredients" class="form-control form-control-dark"
                       placeholder="예: 계란, 양파, 감자, 두부" required>
                <div class="form-hint">쉼표(,)로 구분하여 입력해 주세요.</div>
            </div>

            <!-- 건강 유형 -->
            <div class="mb-3">
                <label for="health_type" class="form-label-dark">
                    <i class="bi bi-heart-pulse text-danger me-1"></i>건강 유형
                </label>
                <select id="health_type" name="health_type" class="form-control form-control-dark">
                    <option value="일반">🍽 일반 (제한 없음)</option>
                    <option value="다이어트">🥗 다이어트</option>
                    <option value="당뇨">🩺 당뇨 관리</option>
                    <option value="저염식">🧂 저염식</option>
                </select>
            </div>

            <!-- 추천 개수 -->
            <div class="mb-4">
                <label for="top_n" class="form-label-dark">
                    <i class="bi bi-list-ol me-1"></i>추천 레시피 수
                </label>
                <select id="top_n" name="top_n" class="form-control form-control-dark">
                    <option value="3">3개</option>
                    <option value="5">5개</option>
                </select>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-gradient-lg">
                    <i class="bi bi-stars me-1"></i>AI 레시피 추천받기
                </button>
            </div>
        </form>
    </div>
</div>
</main>

<!-- ─── FOOTER ─── -->
<footer class="footer mt-auto py-4">
    <div class="container text-center">
        <p class="mb-1 text-muted">
            <span class="brand-gradient-text fw-semibold">냉장고 파먹기</span>
            &nbsp;—&nbsp; AI가 추천하는 오늘의 레시피
        </p>
        <p class="mb-0 text-muted small">&copy; 2024 RecipeKR. Built with Spring Boot 3 &amp; Python AI</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.addEventListener('scroll', () => {
        document.getElementById('mainNavbar').classList.toggle('scrolled', window.scrollY > 30);
    });
</script>
</body>
</html>
