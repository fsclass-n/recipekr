spring:
  datasource:
    # TiDB Serverless (MySQL 호환) 접속 정보
    # GitHub Secrets 또는 로컬 OS 환경 변수를 통해 주입받습니다.
    url: ${TIDB_URL:jdbc:mysql://localhost:4000/recipekr?useSSL=true&serverTimezone=Asia/Seoul}
    username: ${TIDB_USERNAME:root}
    password: ${TIDB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
